name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Тесты универсального пресета @feugene/unocss-preset-granular.
  test-unocss-preset-granular:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test package
        run: yarn test:unocss-preset-granular

  # Сборка @feugene/unocss-preset-granular. Артефакт используется
  # для валидации (publint) и публикации по тегу `v*`.
  build-unocss-preset-granular:
    needs:
      - test-unocss-preset-granular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build package
        run: yarn build:unocss-preset-granular

      - name: Validate package metadata (publint)
        working-directory: packages/unocss-preset-granular
        run: npx --yes publint@latest --pack npm

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: unocss-preset-granular-dist
          path: packages/unocss-preset-granular/dist/

  # Публикация @feugene/unocss-preset-granular в npm по тегу `v<semver>`.
  publish-npm-unocss-preset-granular:
    needs:
      - build-unocss-preset-granular
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        working-directory: packages/unocss-preset-granular
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: unocss-preset-granular-dist
          path: packages/unocss-preset-granular/dist

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/unocss-preset-granular
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Зеркало в GitHub Packages под scope владельца репозитория
  # (`@efureev/unocss-preset-granular`).
  publish-gpr-unocss-preset-granular:
    needs:
      - publish-npm-unocss-preset-granular
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@efureev'

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: unocss-preset-granular-dist
          path: packages/unocss-preset-granular/dist

      - name: Prepare package for GitHub Packages
        working-directory: packages/unocss-preset-granular
        run: |
          npm pkg set name='@efureev/unocss-preset-granular'
          npm pkg delete publishConfig.provenance
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          node -e "const p=require('./package.json');console.log('publishing as:',p.name,'@',p.version)"

      - name: Publish to GitHub Packages
        working-directory: packages/unocss-preset-granular
        run: npm publish --ignore-scripts --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
